<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DailSmart AI{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                    }
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Style for x-cloak to prevent flashing during Alpine initialization -->
    <style>
        [x-cloak] { display: none !important; }
    </style>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">

    <!-- Additional head content -->
    {% block head %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen bg-gradient-to-br from-purple-900 via-blue-900 to-indigo-900 text-white" x-data="appShell()" x-init="init()">

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar (Mobile Drawer) -->
        <template x-if="isLoggedIn">
            <div x-show="sidebarOpen && showNav" x-cloak @click.away="sidebarOpen = false" class="lg:hidden fixed inset-0 z-50 flex">
                <!-- Overlay -->
                <div class="fixed inset-0 bg-black/50 backdrop-blur-sm" aria-hidden="true"></div>

                <!-- Sidebar Panel -->
                <div class="relative w-72 bg-gradient-to-b from-purple-900 to-indigo-900 border-r border-white/10 shadow-2xl flex flex-col">
                    <!-- Sidebar Header -->
                    <div class="flex items-center justify-between h-16 px-4 border-b border-white/10">
                        <a href="/" class="flex items-center gap-2.5 text-white">
                            <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-pink-500 via-purple-500 to-indigo-500 text-sm font-black shadow-lg">🚀</span>
                            <span class="text-lg font-black bg-gradient-to-r from-yellow-400 via-pink-400 to-purple-400 bg-clip-text text-transparent">DailSmart AI</span>
                        </a>
                        <button @click="sidebarOpen = false" class="text-white/60 hover:text-white">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>

                    <!-- Sidebar Nav Items -->
                    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
                        <template x-for="item in navItems" :key="item.href">
                            <a :href="item.href" :class="currentPath === item.href ? 'bg-white/15 text-white border-l-4 border-pink-400' : 'text-white/70 hover:bg-white/10 hover:text-white'" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all">
                                <span class="text-lg" x-text="item.icon"></span>
                                <span x-text="item.label"></span>
                            </a>
                        </template>
                        <a href="/admin" x-show="isAdmin" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-amber-300 bg-amber-500/10 border-l-4 border-amber-400 hover:bg-amber-500/20 transition-all">
                            <span class="text-lg">🛡️</span>
                            <span>Admin Panel</span>
                        </a>
                    </nav>

                    <!-- Sidebar Footer -->
                    <div class="border-t border-white/10 px-4 py-3">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-pink-500 to-purple-500 flex items-center justify-center text-white text-sm font-bold" x-text="userInitial"></div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-bold text-white truncate" x-text="userName"></p>
                            </div>
                            <button @click="handleLogout()" class="text-white/60 hover:text-red-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Sidebar (Desktop Persistent) -->
        <aside x-show="isLoggedIn && showNav && sidebarOpen" x-cloak class="hidden lg:flex flex-col w-72 bg-gradient-to-b from-purple-950/50 to-indigo-950/50 border-r border-white/10 backdrop-blur-xl">
            <div class="flex items-center justify-between h-16 px-6 border-b border-white/10">
                <a href="/" class="flex items-center gap-2.5 text-white">
                    <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-pink-500 via-purple-500 to-indigo-500 text-sm font-black shadow-lg">🚀</span>
                    <span class="text-lg font-black bg-gradient-to-r from-yellow-400 via-pink-400 to-purple-400 bg-clip-text text-transparent">DailSmart AI</span>
                </a>
                <button @click="sidebarOpen = false" class="text-white/40 hover:text-white transition-colors" title="Close Sidebar">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/></svg>
                </button>
            </div>
            <!-- Sidebar Nav Items -->
            <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
                <template x-if="isLoggedIn">
                    <div>
                        <template x-for="item in navItems" :key="item.href">
                            <a :href="item.href" :class="currentPath === item.href ? 'bg-white/15 text-white border-l-4 border-pink-400' : 'text-white/70 hover:bg-white/10 hover:text-white'" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all">
                                <span class="text-lg" x-text="item.icon"></span>
                                <span x-text="item.label"></span>
                            </a>
                        </template>

                        <!-- Admin link (if admin) -->
                        <a href="/admin" x-show="isAdmin" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-amber-300 bg-amber-500/10 border-l-4 border-amber-400 hover:bg-amber-500/20 transition-all">
                            <span class="text-lg">🛡️</span>
                            <span>Admin Panel</span>
                        </a>
                    </div>
                </template>
                <template x-if="!isLoggedIn">
                    <div class="space-y-1">
                        <a href="/#features" @click="sidebarOpen = false" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-white/70 hover:bg-white/10 hover:text-white transition-all">
                            <span>✨</span>
                            <span>Features</span>
                        </a>
                        <a href="/#how-it-works" @click="sidebarOpen = false" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-white/70 hover:bg-white/10 hover:text-white transition-all">
                            <span>⚡</span>
                            <span>How it Works</span>
                        </a>
                    </div>
                </template>
            </nav>
            <div class="p-4 border-t border-white/10">
                <div class="bg-white/5 rounded-2xl p-4">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-pink-500 to-purple-500 flex items-center justify-center text-white font-bold" x-text="userInitial"></div>
                        <div class="min-w-0">
                            <p class="text-sm font-bold truncate" x-text="userName"></p>
                            <p class="text-xs text-blue-300 truncate" x-text="user?.role || 'User'"></p>
                        </div>
                    </div>
                    <button @click="handleLogout()" class="w-full flex items-center justify-center gap-2 py-2 px-4 rounded-xl bg-red-500/10 text-red-400 hover:bg-red-500/20 text-xs font-bold transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Logout
                    </button>
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <!-- Top Bar -->
            <header class="h-16 flex-shrink-0 z-40 border-b border-white/10 bg-purple-900/50 backdrop-blur-xl">
                <div class="flex items-center justify-between h-full px-4">
                    <div class="flex items-center gap-4">
                        <!-- Hamburger (Visible on Mobile, and Desktop when sidebar closed) -->
                        <button x-show="showNav && (!sidebarOpen || window.innerWidth < 1024)" @click="sidebarOpen = true" class="p-2 rounded-lg text-white/70 hover:bg-white/10">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                        </button>
                        
                        <!-- Logo (Visible when logged out, or on mobile when logged in) -->
                        <a href="/" class="flex items-center gap-2.5 text-white" :class="isLoggedIn ? 'lg:hidden' : ''">
                            <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-pink-500 via-purple-500 to-indigo-500 text-sm font-black shadow-lg">🚀</span>
                            <span class="text-lg font-black bg-gradient-to-r from-yellow-400 via-pink-400 to-purple-400 bg-clip-text text-transparent">DailSmart AI</span>
                        </a>

                        <!-- Back Button -->
                        <button x-show="showBackBtn" @click="goBack()" class="inline-flex items-center gap-1 px-3 py-1.5 text-sm font-medium text-white/70 hover:text-white bg-white/10 rounded-lg">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                            Back
                        </button>
                    </div>

                    <!-- Right Side: Guest Navigation or Breadcrumb -->
                    <div class="flex items-center gap-4">
                        <template x-if="!isLoggedIn">
                            <div class="hidden sm:flex items-center gap-6 pr-4">
                                <a href="/#features" class="text-sm font-medium text-white/70 hover:text-white transition-colors">Features</a>
                                <a href="/#how-it-works" class="text-sm font-medium text-white/70 hover:text-white transition-colors">How it Works</a>
                                <a href="/login" class="bg-gradient-to-r from-pink-500 to-purple-500 px-6 py-2.5 rounded-xl text-sm font-black shadow-lg shadow-pink-500/25 hover:scale-105 active:scale-95 transition-all">Sign In</a>
                            </div>
                        </template>
                        <template x-if="isLoggedIn">
                            <div class="flex items-center gap-3">
                                <span class="hidden md:inline text-sm text-blue-200" x-text="'👋 ' + userName"></span>
                                <a href="/profile" class="p-2 rounded-lg bg-white/10 hover:bg-white/20 transition-all">
                                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                                </a>
                            </div>
                        </template>
                    </div>
                </div>
            </header>

            <!-- Main Content Area -->
            <main class="flex-1 overflow-y-auto">
                {% block content %}{% endblock %}
                
                <!-- Page Footer -->
                <footer class="border-t border-white/10 bg-black/20 py-8 mt-auto">
                    <div class="max-w-7xl mx-auto px-6 text-center">
                        <p class="text-xs text-blue-300/60">© 2026 DailSmart AI • Built for faster, sharper job applications. ✨</p>
                    </div>
                </footer>
            </main>
        </div>
    </div>

    <!-- Flash messages -->
    {% if messages %}
    <div class="fixed bottom-4 right-4 z-50">
        {% for message in messages %}
            <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 5000)"
                class="mb-2 p-4 rounded-xl shadow-2xl backdrop-blur-xl border border-white/20 {% if message.type == 'success' %}bg-green-500/20 text-green-200{% elif message.type == 'error' %}bg-red-500/20 text-red-200{% else %}bg-blue-500/20 text-blue-200{% endif %}">
                <div class="flex items-center gap-3">
                    <p class="text-sm font-bold">{{ message.content }}</p>
                    <button @click="show = false" class="opacity-50 hover:opacity-100">&times;</button>
                </div>
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Scripts -->
    <script src="{{ url_for('static', path='js/script.js') }}"></script>
    <script>
    function appShell() {
        return {
            isLoggedIn: false,
            userName: '',
            userInitial: '?',
            user: null,
            isAdmin: false,
            showNav: true,
            showBackBtn: false,
            sidebarOpen: false,
            currentPath: window.location.pathname,
            navItems: [], // Set dynamically in init

            async init() {
                // Only show app navigation (sidebar/header links) on "App" pages
                const publicPages = ['/', '/login', '/register'];
                this.showNav = !publicPages.includes(this.currentPath);
                this.showBackBtn = this.showNav && !['/dashboard', '/admin'].includes(this.currentPath);

                try {
                    const res = await fetch('/api/auth/me');
                    if (res.ok) {
                        const userData = await res.json();
                        this.isLoggedIn = true;
                        this.user = userData;
                        this.isAdmin = userData.is_admin || userData.role === 'admin';
                        this.userName = userData.name || 'User';
                        this.userInitial = this.userName.charAt(0).toUpperCase();

                        if (this.showNav) {
                            this.sidebarOpen = true;
                        }

                        // Set navigation based on role
                        if (this.isAdmin) {
                            this.navItems = [
                                { href: '/admin', icon: '🛡️', label: 'Admin Panel' }
                            ];
                        } else {
                            this.navItems = [
                                { href: '/dashboard', icon: '📊', label: 'Dashboard' },
                                { href: '/create', icon: '✨', label: 'Optimize' },
                                { href: '/build', icon: '📝', label: 'Build' },
                                { href: '/cover-letter', icon: '📄', label: 'Cover Letter' },
                            ];
                        }
                    }
                } catch(e) {}
            },
            
            goBack() {
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    window.location.href = '/dashboard';
                }
            },
            
            async handleLogout() {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/'; // Landing is better than login after logout
            }
        };
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
